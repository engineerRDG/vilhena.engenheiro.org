
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Requisicao de Servico</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #e7eaef;
        font-family: "Courier New", Courier, monospace;
        color: #111;
      }

      .toolbar {
        width: 210mm;
        margin: 12px auto 8px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .toolbar button {
        border: 1px solid #000;
        background: #fff;
        color: #111;
        padding: 6px 12px;
        font-family: inherit;
        font-size: 12px;
        text-transform: uppercase;
        cursor: pointer;
      }

      .toolbar .primary {
        background: #111;
        color: #fff;
      }

      .document {
        width: 210mm;
        height: 297mm;
        margin: 0 auto 14px;
        background: #fff;
        border: 1px solid #000;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.16);
        display: grid;
        grid-template-rows: 58px 66px 22px 1fr 22px 0.7fr 22px 122px 20px;
      }

      .header {
        display: grid;
        grid-template-columns: 155px 1fr;
      }

      .brand {
        border-right: 1px solid #000;
        border-bottom: 1px solid #000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px;
      }

      .brand img {
        max-width: 100%;
        max-height: 42px;
        object-fit: contain;
      }

      .title {
        border-bottom: 1px solid #000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid #000;
        padding: 3px 5px;
        vertical-align: middle;
      }

      th {
        font-size: 11px;
        text-transform: uppercase;
        font-weight: 700;
      }

      td {
        font-size: 12px;
      }

      .meta-table {
        table-layout: fixed;
      }

      input,
      textarea {
        width: 100%;
        border: 0;
        outline: 0;
        background: transparent;
        font-family: inherit;
      }

      input {
        font-size: 12px;
        text-transform: uppercase;
        padding: 2px 0;
      }

      input:focus,
      textarea:focus {
        background: #f3f6fa;
      }

      textarea {
        resize: none;
        font-size: 14px;
        text-transform: none;
        height: 100%;
      }

      .section-title {
        border-top: 1px solid #000;
        border-bottom: 1px solid #000;
        text-align: center;
        text-transform: uppercase;
        font-size: 10px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f7f7;
      }

      .service-area,
      .obs-area {
        padding: 6px;
        background-image: repeating-linear-gradient(
          to bottom,
          transparent,
          transparent 27px,
          rgba(0, 0, 0, 0.18) 28px
        );
      }

      .service-area textarea,
      .obs-area textarea {
        line-height: 28px;
      }

      .sign-title {
        border-top: 1px solid #000;
        border-bottom: 1px solid #000;
        text-align: center;
        text-transform: uppercase;
        font-size: 13px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f7f7;
      }

      .sign-table th {
        font-size: 12px;
      }

      .signature-box {
        height: 92px;
        vertical-align: bottom;
        font-size: 11px;
      }

      .footer-table td {
        text-transform: uppercase;
        text-align: center;
        font-size: 11px;
        font-weight: 700;
        padding: 0 4px;
      }

      @media print {
        @page {
          size: A4 portrait;
          margin: 0;
        }

        body {
          background: #fff;
        }

        .toolbar {
          display: none;
        }

        .document {
          margin: 0;
          width: 210mm;
          height: 297mm;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="clear" type="button">Limpar Campos</button>
      <button id="print" type="button" class="primary">Imprimir</button>
    </div>

    <main class="document">
      <div class="header">
        <div class="brand">
          <img
            src="https://raw.githubusercontent.com/engineerRDG/vilhena.engenheiro.org/refs/heads/main/imagem/logo.png"
            alt="Logo Vilhena"
          />
        </div>
        <div class="title">REQUISICAO DE SERVICO</div>
      </div>

      <table class="meta-table">
        <thead>
          <tr>
            <th>Embarcacao</th>
            <th>Requisitante</th>
            <th>Municipio</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><input type="text" value="" /></td>
            <td><input type="text" value="PREFEITURA MUNICIPAL DE DELFINOPOLIS" /></td>
            <td><input type="text" value="DELFINOPOLIS/MG" /></td>
            <td><input type="text" placeholder="DD/MM/AAAA" /></td>
          </tr>
        </tbody>
      </table>

      <div class="section-title">Descricao do Servico</div>

      <div class="service-area">
        <textarea placeholder="Digite aqui a descricao do servico"></textarea>
      </div>

      <div class="section-title">Observacoes e Informacoes Adicionais</div>

      <div class="obs-area">
        <textarea placeholder="Digite aqui observacoes e informacoes adicionais"></textarea>
      </div>

      <div class="sign-title">Assinaturas</div>

      <table class="sign-table">
        <thead>
          <tr>
            <th style="width: 60%">Aprovacao</th>
            <th>Aceite</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="signature-box">Assinatura:</td>
            <td class="signature-box">Assinatura:</td>
          </tr>
        </tbody>
      </table>

      <table class="footer-table">
        <tbody>
          <tr>
            <td style="width: 60%">Fiscal</td>
            <td>Vilhena Servicos LTDA - TC 800014022</td>
          </tr>
        </tbody>
      </table>
    </main>

    <script>
      const clearButton = document.getElementById("clear");

      clearButton.addEventListener("click", () => {
        window.location.reload();
      });

      document.getElementById("print").addEventListener("click", () => {
        window.print();
      });
    </script>

</body>
</html>
